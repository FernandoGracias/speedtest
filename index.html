<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Speed Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: #080810;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

#globe-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0.85;
}

.overlay {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    width: 100%;
    pointer-events: none;
}

.overlay > * { pointer-events: auto; }

.top-bar {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #555;
}

.top-bar .title {
    font-weight: 600;
    font-size: 13px;
    color: #888;
    letter-spacing: 1.5px;
    text-transform: uppercase;
}

.top-bar .location {
    font-size: 11px;
    color: #444;
}

.center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: -60px;
}

.speed-display {
    text-align: center;
    margin-bottom: 8px;
}

.speed-value {
    font-size: 96px;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, #00f0ff, #0080ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 60px rgba(0, 200, 255, 0.3);
    transition: all 0.3s ease;
}

.speed-value.idle {
    font-size: 48px;
    background: linear-gradient(135deg, #333, #555);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.speed-unit {
    font-size: 18px;
    color: #0088cc;
    font-weight: 500;
    margin-top: 4px;
    letter-spacing: 1px;
}

.status-text {
    font-size: 13px;
    color: #555;
    margin-top: 12px;
    min-height: 20px;
    transition: color 0.3s;
}

.status-text.active { color: #0099dd; }

#btn {
    margin-top: 28px;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid #0088cc;
    background: rgba(0, 100, 180, 0.15);
    color: #00aaff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

#btn:hover { background: rgba(0, 100, 180, 0.3); transform: scale(1.05); }
#btn:disabled { border-color: #333; color: #444; background: rgba(30,30,50,0.5); cursor: not-allowed; transform: none; }
#btn.testing { border-color: #00cc88; color: #00cc88; animation: pulse-ring 1.5s infinite; }

@keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(0, 200, 136, 0.4); }
    70% { box-shadow: 0 0 0 15px rgba(0, 200, 136, 0); }
    100% { box-shadow: 0 0 0 0 rgba(0, 200, 136, 0); }
}

.graph-container {
    position: absolute;
    bottom: 60px;
    left: 20px;
    right: 20px;
    height: 120px;
    z-index: 10;
    pointer-events: none;
}

#graph {
    width: 100%;
    height: 100%;
}

.stats-row {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-around;
    font-size: 11px;
    color: #555;
    z-index: 10;
    pointer-events: none;
}

.stat-item { text-align: center; }
.stat-item .stat-value { font-size: 14px; color: #aaa; font-weight: 600; margin-bottom: 2px; font-family: 'SF Mono', monospace; }
.stat-item .stat-label { color: #444; text-transform: uppercase; font-size: 9px; letter-spacing: 1px; }

.progress-ring {
    position: absolute;
    width: 200px;
    height: 200px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
}

.progress-ring.active { opacity: 1; }

.progress-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
}

.progress-ring circle {
    fill: none;
    stroke-width: 2;
}

.progress-ring .bg { stroke: rgba(0, 100, 180, 0.1); }
.progress-ring .fg { stroke: #00aaff; stroke-linecap: round; transition: stroke-dashoffset 0.3s ease; }
</style>
</head>
<body>

<div id="globe-container"></div>

<div class="overlay">
    <div class="top-bar">
        <span class="title">Independent Speed Test</span>
        <span class="location" id="location-text">Detecting location...</span>
    </div>

    <div class="center-panel">
        <div class="progress-ring" id="progress-ring">
            <svg viewBox="0 0 200 200">
                <circle class="bg" cx="100" cy="100" r="90"/>
                <circle class="fg" id="progress-circle" cx="100" cy="100" r="90" 
                    stroke-dasharray="565.48" stroke-dashoffset="565.48"/>
            </svg>
        </div>
        <div class="speed-display">
            <div class="speed-value idle" id="speed">GO</div>
            <div class="speed-unit" id="speed-unit"></div>
        </div>
        <div class="status-text" id="status">Tap to measure your real download speed</div>
        <button id="btn">START</button>
    </div>
</div>

<div class="graph-container">
    <canvas id="graph"></canvas>
</div>

<div class="stats-row" id="stats-row" style="opacity: 0;">
    <div class="stat-item"><div class="stat-value" id="stat-peak">—</div><div class="stat-label">Peak</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-avg">—</div><div class="stat-label">Average</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-low">—</div><div class="stat-label">Low</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-time">—</div><div class="stat-label">Duration</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {

// ============ GLOBE ============
var scene, camera, renderer, globe, arcGroup, controls;
var userLat = null, userLon = null;
var serverLat = 37.7749, serverLon = -122.4194; // GitHub Pages CDN - SF area
var arcMeshes = [];
var mouseDown = false, mouseX = 0, mouseY = 0;
var rotationX = 0.3, rotationY = 0;
var targetRotationX = 0.3, targetRotationY = 0;
var autoRotate = true;

function initGlobe() {
    var container = document.getElementById('globe-container');
    var w = window.innerWidth, h = window.innerHeight;

    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);
    camera.position.z = 3.2;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Globe sphere with wireframe
    var globeGeo = new THREE.SphereGeometry(1, 64, 64);
    var globeMat = new THREE.MeshBasicMaterial({
        color: 0x0a1628,
        transparent: true,
        opacity: 0.6
    });
    globe = new THREE.Mesh(globeGeo, globeMat);
    scene.add(globe);

    // Wireframe overlay
    var wireGeo = new THREE.SphereGeometry(1.002, 36, 18);
    var wireMat = new THREE.MeshBasicMaterial({
        color: 0x0044aa,
        wireframe: true,
        transparent: true,
        opacity: 0.15
    });
    var wire = new THREE.Mesh(wireGeo, wireMat);
    globe.add(wire);

    // Atmosphere glow
    var glowGeo = new THREE.SphereGeometry(1.05, 32, 32);
    var glowMat = new THREE.MeshBasicMaterial({
        color: 0x0066cc,
        transparent: true,
        opacity: 0.05,
        side: THREE.BackSide
    });
    var glow = new THREE.Mesh(glowGeo, glowMat);
    globe.add(glow);

    // Arc group
    arcGroup = new THREE.Group();
    globe.add(arcGroup);

    // Interaction
    container.addEventListener('mousedown', function(e) { mouseDown = true; mouseX = e.clientX; mouseY = e.clientY; autoRotate = false; });
    container.addEventListener('mousemove', function(e) {
        if (!mouseDown) return;
        var dx = e.clientX - mouseX, dy = e.clientY - mouseY;
        targetRotationY += dx * 0.005;
        targetRotationX += dy * 0.005;
        targetRotationX = Math.max(-1.2, Math.min(1.2, targetRotationX));
        mouseX = e.clientX; mouseY = e.clientY;
    });
    container.addEventListener('mouseup', function() { mouseDown = false; });
    container.addEventListener('touchstart', function(e) {
        mouseDown = true; mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; autoRotate = false;
    });
    container.addEventListener('touchmove', function(e) {
        if (!mouseDown) return;
        var dx = e.touches[0].clientX - mouseX, dy = e.touches[0].clientY - mouseY;
        targetRotationY += dx * 0.005;
        targetRotationX += dy * 0.005;
        targetRotationX = Math.max(-1.2, Math.min(1.2, targetRotationX));
        mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
    });
    container.addEventListener('touchend', function() { mouseDown = false; });

    window.addEventListener('resize', function() {
        var w = window.innerWidth, h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });

    animate();
}

function latLonToVec3(lat, lon, radius) {
    var phi = (90 - lat) * Math.PI / 180;
    var theta = (lon + 180) * Math.PI / 180;
    return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
    );
}

function addLocationDot(lat, lon, color) {
    var pos = latLonToVec3(lat, lon, 1.01);
    var dotGeo = new THREE.SphereGeometry(0.02, 8, 8);
    var dotMat = new THREE.MeshBasicMaterial({ color: color });
    var dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.copy(pos);
    globe.add(dot);

    // Pulse ring
    var ringGeo = new THREE.RingGeometry(0.025, 0.04, 32);
    var ringMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
    var ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(pos);
    ring.lookAt(new THREE.Vector3(0, 0, 0));
    globe.add(ring);
}

function createArc(startLat, startLon, endLat, endLon) {
    var start = latLonToVec3(startLat, startLon, 1.0);
    var end = latLonToVec3(endLat, endLon, 1.0);

    var mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
    var dist = start.distanceTo(end);
    mid.normalize().multiplyScalar(1.0 + dist * 0.4);

    var curve = new THREE.QuadraticBezierCurve3(start, mid, end);
    var points = curve.getPoints(60);
    var geometry = new THREE.BufferGeometry().setFromPoints(points);
    var material = new THREE.LineBasicMaterial({
        color: 0x00ccff,
        transparent: true,
        opacity: 0.0
    });
    var arc = new THREE.Line(geometry, material);
    arcGroup.add(arc);
    return { arc: arc, material: material, points: points, progress: 0 };
}

var activeArcs = [];
var arcAnimating = false;

function startArcAnimation() {
    arcAnimating = true;
    if (userLat === null) return;

    // Clear old arcs
    activeArcs.forEach(function(a) { arcGroup.remove(a.arc); });
    activeArcs = [];

    var arcData = createArc(userLat, userLon, serverLat, serverLon);
    activeArcs.push(arcData);
}

function stopArcAnimation() {
    arcAnimating = false;
    activeArcs.forEach(function(a) { a.material.opacity = 0; });
}

function animate() {
    requestAnimationFrame(animate);

    if (autoRotate) {
        targetRotationY += 0.001;
    }

    rotationX += (targetRotationX - rotationX) * 0.05;
    rotationY += (targetRotationY - rotationY) * 0.05;

    globe.rotation.x = rotationX;
    globe.rotation.y = rotationY;

    // Animate arcs
    if (arcAnimating) {
        activeArcs.forEach(function(a) {
            a.progress += 0.02;
            if (a.progress > 1) a.progress = 0;
            a.material.opacity = 0.6 + Math.sin(a.progress * Math.PI) * 0.4;
        });
    }

    renderer.render(scene, camera);
}

// ============ GRAPH ============
var graphCanvas, graphCtx;
var graphData = [];
var maxGraphPoints = 100;

function initGraph() {
    graphCanvas = document.getElementById('graph');
    graphCtx = graphCanvas.getContext('2d');
    resizeGraph();
    window.addEventListener('resize', resizeGraph);
}

function resizeGraph() {
    var rect = graphCanvas.parentElement.getBoundingClientRect();
    graphCanvas.width = rect.width * window.devicePixelRatio;
    graphCanvas.height = rect.height * window.devicePixelRatio;
    graphCanvas.style.width = rect.width + 'px';
    graphCanvas.style.height = rect.height + 'px';
    graphCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
    drawGraph();
}

function drawGraph() {
    var w = graphCanvas.width / window.devicePixelRatio;
    var h = graphCanvas.height / window.devicePixelRatio;
    graphCtx.clearRect(0, 0, w, h);

    if (graphData.length < 2) return;

    var maxVal = Math.max.apply(null, graphData) * 1.2;
    if (maxVal === 0) maxVal = 1;

    // Grid lines
    graphCtx.strokeStyle = 'rgba(0, 100, 180, 0.1)';
    graphCtx.lineWidth = 0.5;
    for (var i = 0; i < 4; i++) {
        var gy = h - (h * (i + 1) / 4);
        graphCtx.beginPath();
        graphCtx.moveTo(0, gy);
        graphCtx.lineTo(w, gy);
        graphCtx.stroke();
    }

    // Speed line
    var gradient = graphCtx.createLinearGradient(0, 0, 0, h);
    gradient.addColorStop(0, 'rgba(0, 200, 255, 0.8)');
    gradient.addColorStop(1, 'rgba(0, 100, 200, 0.2)');

    graphCtx.beginPath();
    graphCtx.moveTo(0, h);

    for (var i = 0; i < graphData.length; i++) {
        var x = (i / (maxGraphPoints - 1)) * w;
        var y = h - (graphData[i] / maxVal) * h;
        if (i === 0) graphCtx.lineTo(x, y);
        else graphCtx.lineTo(x, y);
    }

    graphCtx.lineTo((graphData.length - 1) / (maxGraphPoints - 1) * w, h);
    graphCtx.closePath();
    graphCtx.fillStyle = gradient;
    graphCtx.fill();

    // Line on top
    graphCtx.beginPath();
    for (var i = 0; i < graphData.length; i++) {
        var x = (i / (maxGraphPoints - 1)) * w;
        var y = h - (graphData[i] / maxVal) * h;
        if (i === 0) graphCtx.moveTo(x, y);
        else graphCtx.lineTo(x, y);
    }
    graphCtx.strokeStyle = '#00ccff';
    graphCtx.lineWidth = 2;
    graphCtx.stroke();

    // Peak marker
    var peakIdx = graphData.indexOf(Math.max.apply(null, graphData));
    var peakX = (peakIdx / (maxGraphPoints - 1)) * w;
    var peakY = h - (graphData[peakIdx] / maxVal) * h;
    graphCtx.beginPath();
    graphCtx.arc(peakX, peakY, 3, 0, Math.PI * 2);
    graphCtx.fillStyle = '#00ffaa';
    graphCtx.fill();
}

// ============ GEOLOCATION ============
function getLocation() {
    if (!navigator.geolocation) {
        document.getElementById('location-text').textContent = 'Location unavailable';
        return;
    }
    navigator.geolocation.getCurrentPosition(function(pos) {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        document.getElementById('location-text').textContent =
            userLat.toFixed(2) + ', ' + userLon.toFixed(2);

        // Add dots to globe
        addLocationDot(userLat, userLon, 0x00ff88);
        addLocationDot(serverLat, serverLon, 0x00aaff);

        // Rotate globe to show user location
        var targetY = -userLon * Math.PI / 180 - Math.PI;
        targetRotationY = targetY;
        targetRotationX = userLat * Math.PI / 180 * 0.5;
        autoRotate = false;
        setTimeout(function() { autoRotate = true; }, 3000);
    }, function() {
        document.getElementById('location-text').textContent = 'Location denied';
        addLocationDot(serverLat, serverLon, 0x00aaff);
    });
}

// ============ SPEED TEST ============
var FILE_URL = "data.bin";
var TEST_DURATION = 12000; // 12 seconds
var SAMPLE_INTERVAL = 0.25; // sample every 250ms

document.getElementById("btn").addEventListener("click", function() {
    var btn = document.getElementById("btn");
    var speedEl = document.getElementById("speed");
    var speedUnit = document.getElementById("speed-unit");
    var statusEl = document.getElementById("status");
    var statsRow = document.getElementById("stats-row");
    var progressRing = document.getElementById("progress-ring");
    var progressCircle = document.getElementById("progress-circle");

    btn.disabled = true;
    btn.classList.add("testing");
    btn.textContent = "...";
    speedEl.classList.remove("idle");
    speedEl.textContent = "0";
    speedUnit.textContent = "Mbps";
    statusEl.textContent = "Measuring speed...";
    statusEl.classList.add("active");
    statsRow.style.opacity = "0";
    progressRing.classList.add("active");

    graphData = [];
    drawGraph();
    startArcAnimation();

    var circumference = 2 * Math.PI * 90;
    var testStartTime = performance.now();
    var totalBytesDownloaded = 0;
    var samples = [];
    var peakSpeed = 0;
    var lowSpeed = Infinity;
    var activeXHRs = [];
    var finished = false;
    var lastSampleTime = testStartTime;
    var lastSampleBytes = 0;
    var concurrentStreams = 4;

    function updateProgress() {
        if (finished) return;
        var now = performance.now();
        var elapsed = now - testStartTime;
        var pct = Math.min(elapsed / TEST_DURATION, 1);
        var offset = circumference * (1 - pct);
        progressCircle.style.strokeDashoffset = offset;

        var remaining = Math.ceil((TEST_DURATION - elapsed) / 1000);
        if (remaining > 0) {
            statusEl.textContent = "Measuring speed... " + remaining + "s";
        }
    }

    function takeSample() {
        if (finished) return;
        var now = performance.now();
        var intervalTime = (now - lastSampleTime) / 1000;

        if (intervalTime >= SAMPLE_INTERVAL) {
            var intervalBytes = totalBytesDownloaded - lastSampleBytes;
            var instantMbps = (intervalBytes * 8) / (intervalTime * 1000000);

            if (instantMbps > 0 || samples.length > 0) {
                samples.push(instantMbps);
                graphData.push(instantMbps);
                if (graphData.length > maxGraphPoints) graphData.shift();
                drawGraph();

                if (instantMbps > peakSpeed) peakSpeed = instantMbps;
                if (instantMbps < lowSpeed && samples.length > 3) lowSpeed = instantMbps;

                var recent = samples.slice(-8);
                var sum = 0;
                for (var i = 0; i < recent.length; i++) sum += recent[i];
                var currentSpeed = sum / recent.length;
                speedEl.textContent = currentSpeed.toFixed(1);
            }

            lastSampleBytes = totalBytesDownloaded;
            lastSampleTime = now;
        }

        updateProgress();
    }

    function finishTest() {
        if (finished) return;
        finished = true;

        // Abort any ongoing XHRs
        activeXHRs.forEach(function(x) { x.abort(); });
        activeXHRs = [];

        var endTime = performance.now();
        var totalSeconds = (endTime - testStartTime) / 1000;
        var avgMbps = (totalBytesDownloaded * 8) / (totalSeconds * 1000000);

        speedEl.textContent = avgMbps.toFixed(1);
        statusEl.textContent = "Complete";
        statusEl.classList.remove("active");
        btn.disabled = false;
        btn.classList.remove("testing");
        btn.textContent = "GO";
        progressRing.classList.remove("active");
        progressCircle.style.strokeDashoffset = "0";
        stopArcAnimation();

        var totalMB = (totalBytesDownloaded / 1048576).toFixed(0);
        document.getElementById("stat-peak").textContent = peakSpeed.toFixed(1) + " Mbps";
        document.getElementById("stat-avg").textContent = avgMbps.toFixed(1) + " Mbps";
        document.getElementById("stat-low").textContent = (lowSpeed === Infinity ? "\u2014" : lowSpeed.toFixed(1) + " Mbps");
        document.getElementById("stat-time").textContent = totalSeconds.toFixed(1) + "s \u00B7 " + totalMB + "MB";
        statsRow.style.opacity = "1";
    }

    function startStream() {
        if (finished) return;

        var xhr = new XMLHttpRequest();
        xhr.open("GET", FILE_URL + "?s=" + Math.random() + "&t=" + Date.now(), true);
        xhr.responseType = "arraybuffer";

        var streamLoaded = 0;

        xhr.onprogress = function(e) {
            var newBytes = e.loaded - streamLoaded;
            totalBytesDownloaded += newBytes;
            streamLoaded = e.loaded;
            takeSample();
        };

        xhr.onload = function() {
            var idx = activeXHRs.indexOf(xhr);
            if (idx > -1) activeXHRs.splice(idx, 1);

            // If time remains, start another download
            if (!finished) {
                startStream();
            }
        };

        xhr.onerror = function() {
            var idx = activeXHRs.indexOf(xhr);
            if (idx > -1) activeXHRs.splice(idx, 1);
            if (!finished && activeXHRs.length === 0) {
                finishTest();
            }
        };

        activeXHRs.push(xhr);
        xhr.send();
    }

    // Start multiple parallel streams
    for (var i = 0; i < concurrentStreams; i++) {
        startStream();
    }

    // End test after TEST_DURATION
    setTimeout(finishTest, TEST_DURATION);

    // Update progress ring smoothly
    var progressInterval = setInterval(function() {
        if (finished) { clearInterval(progressInterval); return; }
        updateProgress();
    }, 100);
});

// ============ INIT ============
initGlobe();
initGraph();
getLocation();

})();
</script>
</body>
</html>
